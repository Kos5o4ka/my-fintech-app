user  nginx;
worker_processes  auto;          # auto = по числу CPU
worker_rlimit_nofile  65535;     # макс. открытых файловых дескрипторов

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;    # не раскрывать версию Nginx

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # 10 МБ зоны хватает примерно на 160 000 уникальных IP
    limit_req_zone  $binary_remote_addr  zone=login:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=api:10m     rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=general:10m rate=120r/m;

    # ── Buffer sizes ────────────────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size        10m;   # для аватаров (flask ограничивает до 5 МБ)
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # ── Proxy общие настройки ───────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";
    proxy_connect_timeout   10s;
    proxy_read_timeout      60s;
    proxy_send_timeout      60s;
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;

    include /etc/nginx/conf.d/*.conf;
}
