# ─────────────────────────────────────────────────────────────────────────────
# InvestTrack — Nginx site configuration
#
# HTTP (порт 80) — для локальной разработки и перенаправления на HTTPS.
# HTTPS (порт 443) — раскомментируйте блок ниже и настройте SSL-сертификаты.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream block removed to allow dynamic resolution

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $app_upstream http://app:5000;

    # Uncomment to redirect all HTTP → HTTPS (when SSL is configured):
    # return 301 https://$host$request_uri;

    # ── Аватары из Docker volume (пишутся приложением динамически) ───────────
    location /static/avatars/ {
        alias /app/avatars_data/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }

    # ── Загруженные файлы из Docker volume ───────────────────────────────────
    location /static/uploads/ {
        alias /app/uploads_data/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }

    # ── Статические файлы — отдаёт Nginx напрямую (минуя Gunicorn) ──────────
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options nosniff;
        access_log off;
        gzip_static on;
    }

    # ── Health check — без rate limit и access лога ──────────────────────────
    location = /health {
        proxy_pass $app_upstream;
        access_log off;
        proxy_read_timeout 5s;
    }

    # ── Login — жёсткий rate limit ───────────────────────────────────────────
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass $app_upstream;
    }

    # ── Telegram webhook — без rate limit (Telegram IP-адреса) ──────────────
    location /api/telegram/ {
        proxy_pass $app_upstream;
    }

    # ── API — умеренный rate limit ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass $app_upstream;
    }

    # ── Всё остальное (страницы) ─────────────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass $app_upstream;
    }
}


