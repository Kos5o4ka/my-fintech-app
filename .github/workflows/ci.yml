name: CI / CD

on:
  push:
    branches: [main, update-fr, master]
  pull_request:
    branches: [main, master]

# Отменяем предыдущий запуск если пришёл новый коммит в ту же ветку
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.4.4 bandit==1.7.8

      - name: ruff — check
        run: ruff check .

      - name: ruff — format check
        run: ruff format --check .

      - name: bandit — security scan
        run: bandit -r . -ll --exclude tests/,venv/,.venv/,migrations/


  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest + hypothesis)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          FLASK_TESTING: "1"
        run: |
          python -m pytest tests/ \
            --no-cov \
            -q \
            --tb=short \
            --timeout=60

      - name: Run tests with coverage (report only)
        env:
          FLASK_TESTING: "1"
        run: |
          python -m pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -q \
            --tb=short
        continue-on-error: true  # не блокируем пайплайн если coverage < threshold

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false


  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: investtrack:${{ github.sha }}
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — /health responds 200
        run: |
          docker run -d \
            --name smoke \
            -p 5001:5000 \
            -e SECRET_KEY=ci-test-secret \
            -e FLASK_ENV=development \
            investtrack:${{ github.sha }}
          sleep 8
          curl -sf http://localhost:5001/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Health:', d)
          sys.exit(0 if d.get('status') in ('ok','degraded') else 1)
          "
          docker stop smoke

