{% extends "base.html" %}

{% block title %}{{ title }} — InvestTrack{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="alert alert-danger" role="alert">
                <h4 class="alert-heading">{{ title }}</h4>
                <p>{{ message }}</p>
                <hr>
                <a href="/dashboard" class="btn btn-primary btn-sm me-2">На главную</a>
                <a href="/profile" class="btn btn-outline-secondary btn-sm">Профиль</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
