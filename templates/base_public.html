<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('portfolioTheme');if(t==='dark')document.documentElement.setAttribute('data-bs-theme','dark');})()</script>
  <title>{% block title %}InvestTrack{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% block description %}InvestTrack — персональный трекер облигационного портфеля{% endblock %}">
  <meta name="theme-color" content="#0f172a">
  {{ csrf_meta_tag() }}
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><polyline points='5,22 11,14 16,18 22,9 27,11' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}" defer></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.min.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>

{% block content %}{% endblock %}

{# ── Global modals ────────────────────────────────────────────────── #}
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:380px;">
    <div class="modal-content border-0 text-center" style="border-radius:var(--radius-xl);">
      <div class="modal-header d-flex justify-content-center border-0 pt-4"
           role="dialog" aria-modal="true"
           aria-labelledby="statusModalTitle" aria-describedby="statusModalMessage">
        <div id="modalIconContainer"
             style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;"
             class="text-white"></div>
      </div>
      <div class="modal-body pt-2 pb-3">
        <h5 class="fw-bold mb-1" id="statusModalTitle"></h5>
        <p id="statusModalMessage" class="mb-0 px-2" style="font-size:.875rem;color:var(--text-secondary);"></p>
      </div>
      <div class="modal-footer justify-content-center border-0 pb-4">
        <button type="button"
                class="btn btn-sm px-4"
                style="background:var(--surface-2);color:var(--text-primary);border:1px solid var(--border-default);border-radius:var(--radius-sm);"
                data-bs-dismiss="modal">Ок</button>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1200;"></div>

<script src="{{ url_for('static', filename='js/common.min.js') }}?v={{ static_ver }}" defer></script>
{% block scripts %}{% endblock %}
</body>
</html>
