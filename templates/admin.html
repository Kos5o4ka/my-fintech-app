{% extends "base.html" %}

{% block title %}Админ — InvestTrack{% endblock %}

{% block content %}
<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">⚙️ Управление пользователями</h4>
    </div>

    <div class="row g-4">
        <!-- Add user form -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white fw-semibold">Добавить пользователя</div>
                <div class="card-body">
                    <form id="adminCreateUserForm">
                        <div class="mb-3">
                            <label class="form-label">Логин</label>
                            <input type="text" id="newUsername" class="form-control"
                                   placeholder="3–20 символов, a-z, 0-9" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" id="newPassword" class="form-control"
                                   placeholder="Минимум 8 символов" required minlength="8">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="isAdminCheck">
                            <label class="form-check-label" for="isAdminCheck">Сделать администратором</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100" id="createUserBtn">Создать</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Users table -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
                    <span>Список пользователей</span>
                    <button class="btn btn-outline-secondary btn-sm" onclick="loadUsersList()">↻ Обновить</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Логин</th>
                                    <th>Роль</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody id="admin-users-table">
                                <tr><td colspan="4" class="text-center text-muted py-4">Загрузка…</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.min.js') }}" defer></script>
{% endblock %}
