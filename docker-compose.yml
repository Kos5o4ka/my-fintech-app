services:
  # ── Flask приложение (Gunicorn) ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: "${SECRET_KEY}"
      DATABASE_URL: postgresql://investtrack:${DB_PASSWORD:-investtrack}@db:5432/investtrack
      REDIS_URL: redis://redis:6379/0
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-noreply@investtrack.app}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-InvestTrackBot}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://194.50.94.45:5000,http://127.0.0.1:5000,http://localhost:5000}
    volumes:
      - app_avatars:/app/static/avatars
      - app_uploads:/app/static/uploads
      - app_cache:/app/.cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: investtrack
      POSTGRES_USER: investtrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-investtrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investtrack -d investtrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 (кэш + rate limiting) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 100
      --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Telegram Bot (long polling) ─────────────────────────────────────────────
  tg-bot:
    build:
      context: ../investtrack-tg-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      DATABASE_URL: postgresql://investtrack:${DB_PASSWORD:-investtrack}@db:5432/investtrack
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      CACHE_KEY_PREFIX: ""
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Nginx (reverse proxy + static files) ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./app/static:/app/static:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  app_avatars:
  app_uploads:
  app_cache:
  nginx_certs:

networks:
  internal:
    driver: bridge